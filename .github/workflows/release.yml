name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      frontend_ref:
        description: 'Frontend git ref to build (branch, tag, or SHA)'
        required: false
        default: 'master'

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24'
  FRONTEND_REPO: yuvalezy/ezy-wms-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build
        run: dotnet build

      - name: Run unit tests
        run: dotnet test UnitTests --no-build --filter "FullyQualifiedName~UnitTests.Unit"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPO }}
          ref: ${{ github.event.inputs.frontend_ref || 'master' }}
          path: frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  publish:
    needs: [test, frontend]
    strategy:
      matrix:
        rid: [win-x64, linux-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Reset wwwroot
        run: rm -rf Service/wwwroot && mkdir -p Service/wwwroot

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: Service/wwwroot

      - name: Publish Service (${{ matrix.rid }})
        run: dotnet publish Service/Service.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish/${{ matrix.rid }}

      - name: Stage config folder
        run: cp -r Service/config publish/${{ matrix.rid }}/config

      - name: Create archive
        run: |
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            zip -r ../../ezy-wms-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip .
          else
            tar -czf ../../ezy-wms-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz .
          fi

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.rid }}
          path: |
            ezy-wms-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip
            ezy-wms-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ezy-wms-${{ steps.version.outputs.version }}-win-x64.zip
            ezy-wms-${{ steps.version.outputs.version }}-linux-x64.tar.gz
          generate_release_notes: true
